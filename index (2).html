<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日成長紀錄</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1410;
    --ink-soft: #3d3530;
    --ink-faint: #7a6e68;
    --paper: #f7f3ee;
    --paper-warm: #ede8e0;
    --paper-deep: #ddd6cc;
    --accent: #8b4a2e;
    --accent-soft: #c07a56;
    --accent-pale: #e8cfc0;
    --green: #3a6b4e;
    --green-pale: #c8dfd2;
    --blue: #2d4a6e;
    --blue-pale: #c5d4e8;
    --gold: #8a6e2a;
    --gold-pale: #e8dab8;
    --line: rgba(26,20,16,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    position: relative;
  }

  /* Paper texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 27px,
        rgba(26,20,16,0.04) 27px,
        rgba(26,20,16,0.04) 28px
      );
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 2px solid var(--ink);
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -5px;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 1px;
    background: var(--ink);
  }
  .header-eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--ink);
    line-height: 1.2;
  }
  .header-subtitle {
    margin-top: 10px;
    font-size: 13px;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 36px;
    border-bottom: 1.5px solid var(--ink);
  }
  .tab-btn {
    flex: 1;
    padding: 12px 8px;
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    margin-bottom: -1.5px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    letter-spacing: 0.05em;
    color: var(--ink-faint);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .tab-btn.active {
    color: var(--ink);
    border-bottom-color: var(--ink);
    font-weight: 500;
  }
  .tab-btn:hover:not(.active) { color: var(--ink-soft); }

  /* Panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Date selector */
  .date-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .date-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--ink-faint);
    text-transform: uppercase;
  }
  .date-input {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    border: 1px solid var(--paper-deep);
    background: var(--paper-warm);
    color: var(--ink);
    padding: 6px 12px;
    border-radius: 2px;
    cursor: pointer;
  }
  .date-input:focus { outline: 1px solid var(--ink); }
  .today-btn {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    padding: 6px 14px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s;
  }
  .today-btn:hover { opacity: 0.8; }

  /* Form cards */
  .form-card {
    background: white;
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 28px 32px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 4px;
  }
  .card-rise::before { background: var(--accent); }
  .card-read::before { background: var(--green); }
  .card-body::before { background: var(--blue); }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 20px;
  }
  .card-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .icon-rise { background: var(--accent-pale); }
  .icon-read { background: var(--green-pale); }
  .icon-body { background: var(--blue-pale); }

  .card-title-group { flex: 1; }
  .card-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 17px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .card-desc {
    font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: 0.03em;
    line-height: 1.6;
  }

  .field-group { margin-bottom: 16px; }
  .field-group:last-child { margin-bottom: 0; }

  .field-label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 6px;
    font-family: 'Space Mono', monospace;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  @media (max-width: 520px) { .field-row { grid-template-columns: 1fr; } }

  input[type="time"],
  input[type="text"],
  textarea {
    width: 100%;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--paper);
    border: 1px solid var(--paper-deep);
    border-radius: 2px;
    padding: 8px 12px;
    transition: border-color 0.2s;
    resize: none;
  }
  input[type="time"]:focus,
  input[type="text"]:focus,
  textarea:focus {
    outline: none;
    border-color: var(--ink-soft);
    background: var(--paper-warm);
  }
  textarea { line-height: 1.7; min-height: 80px; }
  textarea.tall { min-height: 110px; }

  /* Save button */
  .save-bar {
    display: flex;
    justify-content: center;
    margin-top: 32px;
  }
  .save-btn {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    padding: 13px 48px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .save-btn:hover { background: var(--ink-soft); }
  .save-btn:active { transform: translateY(1px); }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--paper);
    font-size: 13px;
    padding: 10px 24px;
    border-radius: 2px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 99;
    letter-spacing: 0.05em;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Review panel */
  .review-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .review-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.1em;
    flex: 1;
  }
  .month-select {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    border: 1px solid var(--paper-deep);
    background: var(--paper-warm);
    color: var(--ink);
    padding: 7px 12px;
    border-radius: 2px;
    cursor: pointer;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  @media (max-width: 520px) { .stats-grid { grid-template-columns: 1fr; } }

  .stat-card {
    background: white;
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
  }
  .stat-rise::after { background: var(--accent); }
  .stat-read::after { background: var(--green); }
  .stat-body::after { background: var(--blue); }

  .stat-num {
    font-family: 'Noto Serif TC', serif;
    font-size: 36px;
    font-weight: 300;
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-label { font-size: 12px; color: var(--ink-faint); letter-spacing: 0.05em; }

  .entries-list { display: flex; flex-direction: column; gap: 16px; }
  .entry-card {
    background: white;
    border: 1px solid var(--line);
    border-radius: 3px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .entry-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

  .entry-date-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--paper-warm);
    border-bottom: 1px solid var(--line);
  }
  .entry-date-text {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 0.1em;
  }
  .entry-day-label {
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
  }
  .entry-delete {
    background: none;
    border: none;
    color: var(--ink-faint);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 2px;
    transition: color 0.2s;
  }
  .entry-delete:hover { color: var(--accent); }

  .entry-body { padding: 16px 20px; }
  .entry-section { margin-bottom: 14px; }
  .entry-section:last-child { margin-bottom: 0; }
  .entry-section-title {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .entry-section-title::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .sec-rise .entry-section-title::before { background: var(--accent); }
  .sec-read .entry-section-title::before { background: var(--green); }
  .sec-body .entry-section-title::before { background: var(--blue); }

  .entry-meta {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 4px;
  }
  .entry-text {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.75;
    white-space: pre-wrap;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-faint);
  }
  .empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; letter-spacing: 0.05em; }

  .review-nav { display: flex; gap: 8px; align-items: center; }
  .nav-btn {
    background: none;
    border: 1px solid var(--paper-deep);
    color: var(--ink-soft);
    width: 32px; height: 32px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .nav-btn:hover { background: var(--paper-warm); border-color: var(--ink-soft); }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--line);
    margin: 28px 0;
  }

  /* Mini calendar heatmap */
  .heatmap-section { margin-bottom: 32px; }
  .heatmap-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .heatmap {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .heatmap-day {
    width: 24px;
    height: 24px;
    border-radius: 3px;
    background: var(--paper-warm);
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--ink-faint);
    cursor: default;
    transition: all 0.15s;
    position: relative;
  }
  .heatmap-day.has-entry {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
    cursor: pointer;
  }
  .heatmap-day.has-entry:hover {
    background: var(--accent);
    border-color: var(--accent);
    transform: scale(1.15);
  }
  .heatmap-day.today-marker {
    box-shadow: 0 0 0 2px var(--accent);
  }
  .heatmap-day.selected-day {
    box-shadow: 0 0 0 2px var(--green);
  }

  /* Day detail popup */
  .day-detail {
    background: white;
    border: 1.5px solid var(--ink);
    border-radius: 3px;
    padding: 24px 28px;
    margin: 16px 0 24px;
    position: relative;
    animation: fadeSlide 0.2s ease;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .day-detail-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--line);
  }
  .day-detail-date {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.06em;
  }
  .day-detail-close {
    background: none;
    border: none;
    font-size: 20px;
    color: var(--ink-faint);
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
  }
  .day-detail-close:hover { color: var(--ink); }

  /* Export button */
  .export-bar {
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .export-btn {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    padding: 7px 18px;
    background: var(--paper-warm);
    border: 1px solid var(--paper-deep);
    border-radius: 2px;
    color: var(--ink-soft);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .export-btn:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .export-hint {
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.03em;
  }

  /* Filter bar for review */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    padding: 5px 14px;
    background: none;
    border: 1px solid var(--paper-deep);
    border-radius: 20px;
    color: var(--ink-faint);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .filter-btn.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--paper); }
  ::-webkit-scrollbar-thumb { background: var(--paper-deep); border-radius: 3px; }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="header-eyebrow">2025 四月 → 五月</div>
    <h1>每日成長紀錄</h1>
    <div class="header-subtitle">早起・閱讀・身體　三個方向，持續校準</div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('record')">今日紀錄</button>
    <button class="tab-btn" onclick="switchTab('review')">回顧總覽</button>
  </div>

  <!-- RECORD PANEL -->
  <div id="panel-record" class="panel active">
    <div class="date-bar">
      <span class="date-label">日期</span>
      <input type="date" class="date-input" id="record-date" />
      <button class="today-btn" onclick="setToday()">今天</button>
    </div>

    <!-- Card 1: Rise -->
    <div class="form-card card-rise">
      <div class="card-header">
        <div class="card-icon icon-rise">🌅</div>
        <div class="card-title-group">
          <div class="card-title">方向一：早起系統</div>
          <div class="card-desc">把早起從挑戰變成可複製的系統</div>
        </div>
      </div>
      <div class="field-row">
        <div class="field-group">
          <label class="field-label" for="sleep-time">昨晚幾點睡</label>
          <input type="time" id="sleep-time" />
        </div>
        <div class="field-group">
          <label class="field-label" for="wake-time">今天幾點起床</label>
          <input type="time" id="wake-time" />
        </div>
      </div>
      <div class="field-group">
        <label class="field-label" for="wake-thought">起床後的第一個念頭</label>
        <textarea id="wake-thought" placeholder="今天醒來腦海第一個浮現的想法是什麼？"></textarea>
      </div>
      <div class="field-group">
        <label class="field-label" for="morning-20">早起後最有價值的 20 分鐘做了什麼</label>
        <textarea id="morning-20" placeholder="那段屬於自己的時間，你如何使用它？"></textarea>
      </div>
    </div>

    <!-- Card 2: Reading -->
    <div class="form-card card-read">
      <div class="card-header">
        <div class="card-icon icon-read">📖</div>
        <div class="card-title-group">
          <div class="card-title">方向二：輸出導向閱讀</div>
          <div class="card-desc">不只問讀了什麼，而是問記住了什麼、改變了什麼</div>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label" for="read-sentence">今天記住的一句話</label>
        <input type="text" id="read-sentence" placeholder="從書、文章、對話或任何地方..."/>
      </div>
      <div class="field-group">
        <label class="field-label" for="read-change">這句話改變了我什麼想法</label>
        <textarea id="read-change" placeholder="哪個原本的觀點被挑戰或更新了？"></textarea>
      </div>
      <div class="field-group">
        <label class="field-label" for="read-apply">今天能把它用在哪裡</label>
        <textarea id="read-apply" placeholder="具體的情境、行動、或下一步..."></textarea>
      </div>
    </div>

    <!-- Card 3: Body -->
    <div class="form-card card-body">
      <div class="card-header">
        <div class="card-icon icon-body">🌿</div>
        <div class="card-title-group">
          <div class="card-title">方向三：身體回饋</div>
          <div class="card-desc">把睡眠、疲勞、情緒當成資料，而不是干擾</div>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label" for="energy-level">今天的能量狀態（1–10）</label>
        <input type="text" id="energy-level" placeholder="1 = 精疲力盡，10 = 精力充沛" />
      </div>
      <div class="field-group">
        <label class="field-label" for="body-signal">身體給了什麼訊號</label>
        <textarea id="body-signal" placeholder="疲勞、緊繃、輕盈、頭痛、愉快... 任何你注意到的感受"></textarea>
      </div>
      <div class="field-group">
        <label class="field-label" for="body-insight">這個訊號告訴你什麼</label>
        <textarea id="body-insight" placeholder="它和昨天的選擇有什麼關聯？你想調整什麼？"></textarea>
      </div>
    </div>

    <!-- Optional free note -->
    <div class="form-card" style="border-left: 4px solid var(--gold);">
      <div class="card-header">
        <div class="card-icon" style="background: var(--gold-pale);">✍️</div>
        <div class="card-title-group">
          <div class="card-title" style="font-family:'Noto Serif TC',serif;">今日隨筆</div>
          <div class="card-desc">任何想說的話，不需要格式</div>
        </div>
      </div>
      <div class="field-group">
        <textarea class="tall" id="free-note" placeholder="今天有什麼想法、感受、或發現值得留下來？"></textarea>
      </div>
    </div>

    <div class="save-bar">
      <button class="save-btn" onclick="saveEntry()">儲存今日紀錄</button>
    </div>
  </div>

  <!-- REVIEW PANEL -->
  <div id="panel-review" class="panel">
    <div class="review-header">
      <div class="review-title">回顧總覽</div>
      <div class="review-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
        <select class="month-select" id="review-month" onchange="renderReview()"></select>
        <button class="nav-btn" onclick="changeMonth(1)">›</button>
      </div>
    </div>

    <!-- Heatmap -->
    <div class="heatmap-section">
      <div class="heatmap-title">本月紀錄出席　<span style="font-size:10px;color:var(--accent);">（點深色日期可展開）</span></div>
      <div class="heatmap" id="heatmap"></div>
      <div id="day-detail-container"></div>
    </div>

    <div class="divider"></div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card stat-rise">
        <div class="stat-num" id="stat-count">0</div>
        <div class="stat-label">本月紀錄天數</div>
      </div>
      <div class="stat-card stat-read">
        <div class="stat-num" id="stat-avg-energy">—</div>
        <div class="stat-label">平均能量狀態</div>
      </div>
      <div class="stat-card stat-body">
        <div class="stat-num" id="stat-avg-wake">—</div>
        <div class="stat-label">平均起床時間</div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Export -->
    <div class="export-bar">
      <button class="export-btn" onclick="exportForChatGPT()">📋 複製整月給 ChatGPT</button>
      <span class="export-hint">複製後貼到 ChatGPT，請它幫你彙總這個月的成長</span>
    </div>

    <!-- Filter -->
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">全部</button>
      <button class="filter-btn" data-filter="rise" onclick="setFilter('rise', this)">🌅 早起</button>
      <button class="filter-btn" data-filter="read" onclick="setFilter('read', this)">📖 閱讀</button>
      <button class="filter-btn" data-filter="body" onclick="setFilter('body', this)">🌿 身體</button>
      <button class="filter-btn" data-filter="note" onclick="setFilter('note', this)">✍️ 隨筆</button>
    </div>

    <div class="entries-list" id="entries-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="loading-overlay" style="display:none;position:fixed;inset:0;background:rgba(247,243,238,0.8);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:12px;"><div style="width:32px;height:32px;border:2px solid #ddd6cc;border-top-color:#1a1410;border-radius:50%;animation:spin 0.7s linear infinite;"></div><div style="font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.15em;color:#7a6e68;">同步中...</div></div>
<style>@keyframes spin{to{transform:rotate(360deg);}}</style>

<script type="module">
// ---- Firebase ----
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, deleteDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBqZLrJ-a9FsIwKKs5Cegjq2QjzeWGpSeI",
  authDomain: "dailywork-602a3.firebaseapp.com",
  projectId: "dailywork-602a3",
  storageBucket: "dailywork-602a3.firebasestorage.app",
  messagingSenderId: "969223511394",
  appId: "1:969223511394:web:719fc05024c326ba0c603b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ---- Storage ----
// In-memory cache
let entriesCache = null;

async function loadEntries() {
  if (entriesCache) return entriesCache;
  const snapshot = await getDocs(collection(db, 'entries'));
  entriesCache = {};
  snapshot.forEach(d => { entriesCache[d.id] = d.data(); });
  return entriesCache;
}

async function saveEntryToDb(date, data) {
  await setDoc(doc(db, 'entries', date), data);
  if (entriesCache) entriesCache[date] = data;
}

async function deleteEntryFromDb(date) {
  await deleteDoc(doc(db, 'entries', date));
  if (entriesCache) delete entriesCache[date];
}

// ---- Helpers ----
function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

function formatDate(str) {
  const d = new Date(str + 'T00:00:00');
  const days = ['日','一','二','三','四','五','六'];
  return `${d.getFullYear()} 年 ${d.getMonth()+1} 月 ${d.getDate()} 日（週${days[d.getDay()]}）`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function showLoading(on) {
  document.getElementById('loading-overlay').style.display = on ? 'flex' : 'none';
}

// ---- Tabs ----
window.switchTab = function(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['record','review'][i] === name);
  });
  document.getElementById('panel-record').classList.toggle('active', name === 'record');
  document.getElementById('panel-review').classList.toggle('active', name === 'review');
  if (name === 'review') renderReview();
}

// ---- Record tab ----
let currentDate = todayStr();

window.setToday = function() {
  currentDate = todayStr();
  document.getElementById('record-date').value = currentDate;
  loadEntryToForm(currentDate);
}

async function loadEntryToForm(date) {
  showLoading(true);
  const entries = await loadEntries();
  showLoading(false);
  const e = entries[date] || {};
  document.getElementById('sleep-time').value = e.sleepTime || '';
  document.getElementById('wake-time').value = e.wakeTime || '';
  document.getElementById('wake-thought').value = e.wakeThought || '';
  document.getElementById('morning-20').value = e.morning20 || '';
  document.getElementById('read-sentence').value = e.readSentence || '';
  document.getElementById('read-change').value = e.readChange || '';
  document.getElementById('read-apply').value = e.readApply || '';
  document.getElementById('energy-level').value = e.energyLevel || '';
  document.getElementById('body-signal').value = e.bodySignal || '';
  document.getElementById('body-insight').value = e.bodyInsight || '';
  document.getElementById('free-note').value = e.freeNote || '';
}

window.saveEntry = async function() {
  const date = document.getElementById('record-date').value;
  if (!date) { showToast('請先選擇日期'); return; }
  const data = {
    sleepTime: document.getElementById('sleep-time').value,
    wakeTime: document.getElementById('wake-time').value,
    wakeThought: document.getElementById('wake-thought').value,
    morning20: document.getElementById('morning-20').value,
    readSentence: document.getElementById('read-sentence').value,
    readChange: document.getElementById('read-change').value,
    readApply: document.getElementById('read-apply').value,
    energyLevel: document.getElementById('energy-level').value,
    bodySignal: document.getElementById('body-signal').value,
    bodyInsight: document.getElementById('body-insight').value,
    freeNote: document.getElementById('free-note').value,
    savedAt: new Date().toISOString()
  };
  showLoading(true);
  try {
    await saveEntryToDb(date, data);
    showToast('✓ 已儲存');
  } catch(err) {
    showToast('儲存失敗，請重試');
    console.error(err);
  }
  showLoading(false);
}

document.getElementById('record-date').addEventListener('change', function() {
  currentDate = this.value;
  entriesCache = null; // refresh cache on date change
  loadEntryToForm(currentDate);
});

// ---- Review tab ----
let reviewYear, reviewMonth;
let currentFilter = 'all';

function initReviewMonths() {
  const sel = document.getElementById('review-month');
  sel.innerHTML = '';
  const now = new Date();
  for (let y = 2025; y <= now.getFullYear() + 1; y++) {
    const startM = (y === 2025) ? 4 : 1;
    const endM = (y === now.getFullYear()) ? now.getMonth() + 1 : 12;
    for (let m = startM; m <= endM; m++) {
      const val = `${y}-${String(m).padStart(2,'0')}`;
      const label = `${y} 年 ${m} 月`;
      const opt = document.createElement('option');
      opt.value = val; opt.textContent = label;
      if (y === now.getFullYear() && m === now.getMonth()+1) opt.selected = true;
      sel.appendChild(opt);
    }
  }
  const v = sel.value.split('-');
  reviewYear = parseInt(v[0]); reviewMonth = parseInt(v[1]);
}

window.changeMonth = function(delta) {
  reviewMonth += delta;
  if (reviewMonth > 12) { reviewMonth = 1; reviewYear++; }
  if (reviewMonth < 1) { reviewMonth = 12; reviewYear--; }
  const val = `${reviewYear}-${String(reviewMonth).padStart(2,'0')}`;
  document.getElementById('review-month').value = val;
  renderReview();
}

window.setFilter = function(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderEntriesFromCache();
}

async function renderReview() {
  const v = document.getElementById('review-month').value.split('-');
  reviewYear = parseInt(v[0]); reviewMonth = parseInt(v[1]);
  showLoading(true);
  entriesCache = null;
  await loadEntries();
  showLoading(false);
  renderHeatmap();
  renderStats();
  renderEntriesFromCache();
}

function getMonthEntries() {
  const entries = entriesCache || {};
  const prefix = `${reviewYear}-${String(reviewMonth).padStart(2,'0')}`;
  return Object.entries(entries)
    .filter(([d]) => d.startsWith(prefix))
    .sort(([a],[b]) => b.localeCompare(a));
}

let selectedDay = null;

function renderHeatmap() {
  const daysInMonth = new Date(reviewYear, reviewMonth, 0).getDate();
  const entries = entriesCache || {};
  const prefix = `${reviewYear}-${String(reviewMonth).padStart(2,'0')}`;
  const today = todayStr();
  const hm = document.getElementById('heatmap');
  hm.innerHTML = '';
  selectedDay = null;
  document.getElementById('day-detail-container').innerHTML = '';

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${prefix}-${String(d).padStart(2,'0')}`;
    const hasEntry = !!entries[dateStr];
    const div = document.createElement('div');
    div.className = 'heatmap-day' + (hasEntry ? ' has-entry' : '') + (dateStr === today ? ' today-marker' : '');
    div.id = 'hday-' + dateStr;
    div.title = hasEntry ? formatDate(dateStr) + '　（點擊展開）' : formatDate(dateStr);
    div.textContent = d;
    if (hasEntry) {
      div.onclick = () => toggleDayDetail(dateStr, entries[dateStr]);
    }
    hm.appendChild(div);
  }
}

function toggleDayDetail(date, e) {
  const container = document.getElementById('day-detail-container');
  // If clicking same day, close it
  if (selectedDay === date) {
    selectedDay = null;
    container.innerHTML = '';
    document.querySelectorAll('.heatmap-day').forEach(d => d.classList.remove('selected-day'));
    return;
  }
  selectedDay = date;
  document.querySelectorAll('.heatmap-day').forEach(d => d.classList.remove('selected-day'));
  document.getElementById('hday-' + date)?.classList.add('selected-day');

  container.innerHTML = `
    <div class="day-detail">
      <div class="day-detail-header">
        <div class="day-detail-date">${formatDate(date)}</div>
        <button class="day-detail-close" onclick="closeDayDetail()">×</button>
      </div>
      ${e.sleepTime || e.wakeTime ? `<div class="entry-section sec-rise" style="margin-bottom:14px;">
        <div class="entry-section-title">🌅 早起系統</div>
        <div class="entry-meta">${e.sleepTime ? '入睡 ' + e.sleepTime : ''} ${e.sleepTime && e.wakeTime ? '→' : ''} ${e.wakeTime ? '起床 ' + e.wakeTime : ''}</div>
        ${e.wakeThought ? `<div class="entry-text" style="margin-top:6px;"><span style="color:var(--ink-faint);font-size:11px;">第一個念頭　</span>${e.wakeThought}</div>` : ''}
        ${e.morning20 ? `<div class="entry-text"><span style="color:var(--ink-faint);font-size:11px;">最有價值的20分鐘　</span>${e.morning20}</div>` : ''}
      </div>` : ''}
      ${e.readSentence || e.readChange || e.readApply ? `<div class="entry-section sec-read" style="margin-bottom:14px;">
        <div class="entry-section-title">📖 閱讀輸出</div>
        ${e.readSentence ? `<div class="entry-text" style="font-weight:500;color:var(--green);margin-bottom:4px;">「${e.readSentence}」</div>` : ''}
        ${e.readChange ? `<div class="entry-text"><span style="color:var(--ink-faint);font-size:11px;">改變的想法　</span>${e.readChange}</div>` : ''}
        ${e.readApply ? `<div class="entry-text"><span style="color:var(--ink-faint);font-size:11px;">今日應用　</span>${e.readApply}</div>` : ''}
      </div>` : ''}
      ${e.energyLevel || e.bodySignal || e.bodyInsight ? `<div class="entry-section sec-body" style="margin-bottom:14px;">
        <div class="entry-section-title">🌿 身體回饋</div>
        ${e.energyLevel ? `<div class="entry-meta">能量狀態 ${e.energyLevel} / 10</div>` : ''}
        ${e.bodySignal ? `<div class="entry-text"><span style="color:var(--ink-faint);font-size:11px;">訊號　</span>${e.bodySignal}</div>` : ''}
        ${e.bodyInsight ? `<div class="entry-text"><span style="color:var(--ink-faint);font-size:11px;">洞察　</span>${e.bodyInsight}</div>` : ''}
      </div>` : ''}
      ${e.freeNote ? `<div class="entry-section" style="border-top:1px dashed var(--line);padding-top:12px;">
        <div class="entry-section-title" style="color:var(--gold);">✍️ 隨筆</div>
        <div class="entry-text">${e.freeNote}</div>
      </div>` : ''}
    </div>`;
  // Scroll into view
  setTimeout(() => container.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
}

window.closeDayDetail = function() {
  selectedDay = null;
  document.getElementById('day-detail-container').innerHTML = '';
  document.querySelectorAll('.heatmap-day').forEach(d => d.classList.remove('selected-day'));
}

window.exportForChatGPT = function() {
  const monthEntries = getMonthEntries();
  if (!monthEntries.length) { showToast('這個月還沒有紀錄'); return; }

  const monthLabel = `${reviewYear} 年 ${reviewMonth} 月`;
  let text = `以下是我 ${monthLabel} 的每日成長紀錄，請幫我彙整這個月的成長模式、發現規律，並給我具體的回饋與下個月的建議。\n\n`;
  text += `━━━━━━━━━━━━━━━━━━━━━━\n${monthLabel} 成長紀錄（共 ${monthEntries.length} 天）\n━━━━━━━━━━━━━━━━━━━━━━\n\n`;

  monthEntries.slice().reverse().forEach(([date, e]) => {
    text += `【${formatDate(date)}】\n`;
    if (e.sleepTime || e.wakeTime) text += `🌅 早起：入睡 ${e.sleepTime||'—'} → 起床 ${e.wakeTime||'—'}\n`;
    if (e.wakeThought) text += `　第一個念頭：${e.wakeThought}\n`;
    if (e.morning20) text += `　最有價值的20分鐘：${e.morning20}\n`;
    if (e.readSentence) text += `📖 記住的句子：「${e.readSentence}」\n`;
    if (e.readChange) text += `　改變的想法：${e.readChange}\n`;
    if (e.readApply) text += `　今日應用：${e.readApply}\n`;
    if (e.energyLevel) text += `🌿 能量狀態：${e.energyLevel}/10\n`;
    if (e.bodySignal) text += `　身體訊號：${e.bodySignal}\n`;
    if (e.bodyInsight) text += `　洞察：${e.bodyInsight}\n`;
    if (e.freeNote) text += `✍️ 隨筆：${e.freeNote}\n`;
    text += '\n';
  });

  navigator.clipboard.writeText(text).then(() => {
    showToast('✓ 已複製！貼到 ChatGPT 就能彙總');
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✓ 已複製！貼到 ChatGPT 就能彙總');
  });
}

function renderStats() {
  const monthEntries = getMonthEntries();
  document.getElementById('stat-count').textContent = monthEntries.length;
  const energies = monthEntries.map(([,e]) => parseFloat(e.energyLevel)).filter(n => !isNaN(n));
  document.getElementById('stat-avg-energy').textContent = energies.length
    ? (energies.reduce((a,b)=>a+b,0)/energies.length).toFixed(1) : '—';
  const wakeTimes = monthEntries.map(([,e]) => e.wakeTime).filter(t => t && t.includes(':'));
  if (wakeTimes.length) {
    const mins = wakeTimes.map(t => { const [h,m] = t.split(':').map(Number); return h*60+m; });
    const avg = Math.round(mins.reduce((a,b)=>a+b,0)/mins.length);
    document.getElementById('stat-avg-wake').textContent = `${String(Math.floor(avg/60)).padStart(2,'0')}:${String(avg%60).padStart(2,'0')}`;
  } else { document.getElementById('stat-avg-wake').textContent = '—'; }
}

function renderEntriesFromCache() {
  const monthEntries = getMonthEntries();
  const list = document.getElementById('entries-list');
  if (!monthEntries.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>這個月還沒有紀錄</p></div>`;
    return;
  }
  list.innerHTML = monthEntries.map(([date, e]) => {
    const showRise = currentFilter === 'all' || currentFilter === 'rise';
    const showRead = currentFilter === 'all' || currentFilter === 'read';
    const showBody = currentFilter === 'all' || currentFilter === 'body';
    const showNote = currentFilter === 'all' || currentFilter === 'note';
    let sections = '';
    if (showRise) sections += `
      <div class="entry-section sec-rise">
        <div class="entry-section-title">🌅 早起系統</div>
        ${e.sleepTime || e.wakeTime ? `<div class="entry-meta">${e.sleepTime ? '入睡 ' + e.sleepTime : ''} ${e.sleepTime && e.wakeTime ? '→' : ''} ${e.wakeTime ? '起床 ' + e.wakeTime : ''}</div>` : ''}
        ${e.wakeThought ? `<div class="entry-text" style="margin-bottom:6px;"><span style="color:var(--ink-faint);font-size:11px;">第一個念頭　</span>${e.wakeThought}</div>` : ''}
        ${e.morning20 ? `<div class="entry-text"><span style="color:var(--ink-faint);font-size:11px;">最有價值的20分鐘　</span>${e.morning20}</div>` : ''}
        ${!e.sleepTime && !e.wakeTime && !e.wakeThought && !e.morning20 ? `<div class="entry-text" style="color:var(--ink-faint);font-style:italic;">未填寫</div>` : ''}
      </div>`;
    if (showRead) sections += `
      <div class="entry-section sec-read">
        <div class="entry-section-title">📖 閱讀輸出</div>
        ${e.readSentence ? `<div class="entry-text" style="margin-bottom:6px;font-weight:500;color:var(--green);">「${e.readSentence}」</div>` : ''}
        ${e.readChange ? `<div class="entry-text" style="margin-bottom:4px;"><span style="color:var(--ink-faint);font-size:11px;">改變的想法　</span>${e.readChange}</div>` : ''}
        ${e.readApply ? `<div class="entry-text"><span style="color:var(--ink-faint);font-size:11px;">今日應用　</span>${e.readApply}</div>` : ''}
        ${!e.readSentence && !e.readChange && !e.readApply ? `<div class="entry-text" style="color:var(--ink-faint);font-style:italic;">未填寫</div>` : ''}
      </div>`;
    if (showBody) sections += `
      <div class="entry-section sec-body">
        <div class="entry-section-title">🌿 身體回饋</div>
        ${e.energyLevel ? `<div class="entry-meta">能量狀態 ${e.energyLevel} / 10</div>` : ''}
        ${e.bodySignal ? `<div class="entry-text" style="margin-bottom:4px;"><span style="color:var(--ink-faint);font-size:11px;">訊號　</span>${e.bodySignal}</div>` : ''}
        ${e.bodyInsight ? `<div class="entry-text"><span style="color:var(--ink-faint);font-size:11px;">洞察　</span>${e.bodyInsight}</div>` : ''}
        ${!e.energyLevel && !e.bodySignal && !e.bodyInsight ? `<div class="entry-text" style="color:var(--ink-faint);font-style:italic;">未填寫</div>` : ''}
      </div>`;
    if (showNote && e.freeNote) sections += `
      <div class="entry-section" style="border-top:1px dashed var(--line);padding-top:12px;margin-top:12px;">
        <div class="entry-section-title" style="color:var(--gold);">✍️ 隨筆</div>
        <div class="entry-text">${e.freeNote}</div>
      </div>`;
    return `
      <div class="entry-card">
        <div class="entry-date-bar">
          <span class="entry-date-text">${formatDate(date)}</span>
          <button class="entry-delete" onclick="window.deleteEntry('${date}')" title="刪除此筆紀錄">×</button>
        </div>
        <div class="entry-body">${sections}</div>
      </div>`;
  }).join('');
}

window.deleteEntry = async function(date) {
  if (!confirm(`確定要刪除 ${formatDate(date)} 的紀錄嗎？`)) return;
  showLoading(true);
  try {
    await deleteEntryFromDb(date);
    showToast('已刪除');
    renderHeatmap();
    renderStats();
    renderEntriesFromCache();
  } catch(err) {
    showToast('刪除失敗');
    console.error(err);
  }
  showLoading(false);
}

// ---- Init ----
document.getElementById('record-date').value = todayStr();
loadEntryToForm(todayStr());
initReviewMonths();
</script>
</body>
</html>
